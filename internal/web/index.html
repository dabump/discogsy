<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discogsy</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --text: #f6f1e8;
      --muted: #b5ad9f;
      --accent: #ffb000;
      --accent-2: #ff4d6d;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(255, 176, 0, 0.18), transparent 30rem), var(--bg);
      color: var(--text);
    }

    .hero {
      position: relative;
      min-height: 252px;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 38px 24px;
      isolation: isolate;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
    }

    .hero::before {
      background: linear-gradient(180deg, rgba(11, 13, 18, 0.3), rgba(11, 13, 18, 0.92));
    }

    .hero::after {
      background: radial-gradient(circle, transparent 20%, rgba(11, 13, 18, 0.8) 78%);
    }

    .collage {
      position: absolute;
      inset: -80px;
      z-index: -2;
      display: grid;
      grid-template-columns: repeat(7, minmax(130px, 1fr));
      gap: 16px;
      transform: rotate(-6deg) scale(1.1);
      opacity: 0.62;
    }

    .collage img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .hero-content {
      max-width: 960px;
      text-align: center;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      background: rgba(11, 13, 18, 0.52);
      backdrop-filter: blur(18px);
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 6.6vw, 5.1rem);
      line-height: 0.88;
      letter-spacing: -0.08em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(1.08rem, 1.44vw, 1.2rem);
    }

    main {
      width: min(1440px, calc(100% - 32px));
      margin: -24px auto 64px;
      position: relative;
      z-index: 2;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      background: rgba(18, 21, 29, 0.84);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      outline: none;
      padding: 14px 16px;
    }

    input:focus,
    select:focus { border-color: var(--accent); }

    select { max-width: 240px; }

    .count {
      margin: 18px 4px 22px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 24px;
    }

    .card {
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 176, 0, 0.55);
    }

    .poster {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      object-fit: cover;
      background: #171a22;
    }

    .details { padding: 16px; }

    .artist {
      margin: 0 0 6px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .album {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
    }

    .year {
      display: inline-flex;
      margin-top: 12px;
      color: #120d00;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .empty {
      display: none;
      padding: 54px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 24px;
    }

    @media (max-width: 720px) {
      .hero { min-height: 216px; }
      .collage { grid-template-columns: repeat(4, minmax(110px, 1fr)); }
      .hero-content { padding: 14px; }
      main { width: min(100% - 20px, 1440px); }
      .toolbar { grid-template-columns: 1fr; }
      select { max-width: none; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
    }
  </style>
</head>
<body>
  <section class="hero" aria-label="{{.CollectionName}} vinyl collection">
    <div class="collage" aria-hidden="true">
      {{range .HeroPosters}}<img src="/posters/{{.}}" alt="" loading="eager">{{end}}
    </div>
    <div class="hero-content">
      <h1>{{.CollectionName}} vinyl collection</h1>
      <p class="subtitle">Browse the shelves by date added, artist, or year without leaving the groove.</p>
    </div>
  </section>

  <main>
    <section class="toolbar" aria-label="Collection controls">
      <input id="filter" type="search" placeholder="Filter by artist, album, or year" autocomplete="off" autofocus>
      <select id="sort" aria-label="Sort direction">
        <option value="dateAdded-desc">Date Added Newest First</option>
        <option value="dateAdded-asc">Date Added Oldest First</option>
        <option value="artist-asc">Artist A to Z</option>
        <option value="artist-desc">Artist Z to A</option>
        <option value="year-asc">Year Oldest First</option>
        <option value="year-desc">Year Newest First</option>
      </select>
    </section>
    <p class="count" id="count"></p>
    <section class="grid" id="collection" aria-live="polite"></section>
    <section class="empty" id="empty">No records match that filter.</section>
  </main>

  <script id="records-data" type="application/json">{{.RecordsJSON}}</script>
  <script>
    let records = JSON.parse(document.getElementById('records-data').textContent);
    const collection = document.getElementById('collection');
    const count = document.getElementById('count');
    const empty = document.getElementById('empty');
    const filter = document.getElementById('filter');
    const sort = document.getElementById('sort');

    function recordText(record) {
      return [record.artist, record.album, record.year || ''].join(' ').toLowerCase();
    }

    function compareArtist(a, b) {
      return a.artist.localeCompare(b.artist, undefined, { sensitivity: 'base' });
    }

    function compareYear(a, b, direction) {
      if (!a.year && !b.year) return compareArtist(a, b);
      if (!a.year) return 1;
      if (!b.year) return -1;
      return (a.year - b.year) * direction || compareArtist(a, b);
    }

    function compareDateAdded(a, b, direction) {
      const dateA = Date.parse(a['date added']);
      const dateB = Date.parse(b['date added']);
      if (Number.isNaN(dateA) && Number.isNaN(dateB)) return compareArtist(a, b);
      if (Number.isNaN(dateA)) return 1;
      if (Number.isNaN(dateB)) return -1;
      return (dateA - dateB) * direction || compareArtist(a, b);
    }

    function render() {
      const term = filter.value.trim().toLowerCase();
      const [field, order] = sort.value.split('-');
      const direction = order === 'desc' ? -1 : 1;
      const visible = records
        .filter((record) => recordText(record).includes(term))
        .sort((a, b) => {
          if (field === 'dateAdded') return compareDateAdded(a, b, direction);
          if (field === 'year') return compareYear(a, b, direction);
          return compareArtist(a, b) * direction;
        });

      collection.replaceChildren(...visible.map((record) => {
        const card = document.createElement(record['discogs link'] ? 'a' : 'article');
        card.className = 'card';
        if (record['discogs link']) {
          card.href = record['discogs link'];
          card.target = '_blank';
          card.rel = 'noreferrer';
          card.style.color = 'inherit';
          card.style.textDecoration = 'none';
        }

        const img = document.createElement('img');
        img.className = 'poster';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.src = '/posters/' + encodeURIComponent(record.poster);
        img.alt = record.album + ' album cover';

        const details = document.createElement('div');
        details.className = 'details';
        details.innerHTML = '<p class="artist"></p><p class="album"></p>' + (record.year ? '<span class="year"></span>' : '');
        details.querySelector('.artist').textContent = record.artist;
        details.querySelector('.album').textContent = record.album;
        const year = details.querySelector('.year');
        if (year) year.textContent = record.year;

        card.append(img, details);
        return card;
      }));

      count.textContent = visible.length + ' of ' + records.length + ' records';
      empty.style.display = visible.length ? 'none' : 'block';
    }

    async function reloadRecords() {
      const response = await fetch('/api/records', { cache: 'no-store' });
      if (!response.ok) return;

      const latestRecords = await response.json();
      if (JSON.stringify(latestRecords) === JSON.stringify(records)) return;

      records = latestRecords;
      render();
    }

    filter.addEventListener('input', render);
    sort.addEventListener('change', render);
    render();
    setInterval(reloadRecords, 5 * 60 * 1000);
  </script>
</body>
</html>
